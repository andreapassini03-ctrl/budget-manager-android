<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Manager Screenshots</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        .screenshot {
            max-width: 80%;
            height: 500px;
            object-fit: contain;
            margin: 20px 0;
            border: 2px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>Budget Manager Screenshots</h1>

    <img src="Screenshots/wallet_1.png" alt="Wallet 1" class="screenshot">
    <img src="Screenshots/wallet_2.png" alt="Wallet 2" class="screenshot">
    <img src="Screenshots/wallet_3.png" alt="Wallet 3" class="screenshot">
    <img src="Screenshots/wallet_4.png" alt="Wallet 4" class="screenshot">
    <img src="Screenshots/wallet_5.png" alt="Wallet 5" class="screenshot">
    <img src="Screenshots/wallet_6.png" alt="Wallet 6" class="screenshot">

</body>
</html>
